<!DOCTYPE html>
<html>
<head>
    <title>College Event Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>EventHub</h2>
    <ul>
        <li>Home</li>
        <li>Events</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero">
    <h1>College Event Management Platform</h1>
    <p>Discover and register for all upcoming events</p>
</section>

<!-- Search -->
<div class="search-box">
    <input type="text" id="search" placeholder="Search events..." onkeyup="searchEvent()">
</div>

<!-- Events -->
<section class="events" id="eventList">

    <div class="card">
        <h3>Hackathon 2026</h3>
        <p>5 April | Seminar Hall</p>
        <a href="event.html">View Details</a>
    </div>

    <div class="card">
        <h3>AI Workshop</h3>
        <p>10 April | Lab 3</p>
        <a href="event.html">View Details</a>
    </div>

    <div class="card">
        <h3>Cultural Fest</h3>
        <p>20 April | Auditorium</p>
        <a href="event.html">View Details</a>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
